version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: recon_db
    environment:
      POSTGRES_USER: recon_user
      POSTGRES_PASSWORD: recon_password
      POSTGRES_DB: recon_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
